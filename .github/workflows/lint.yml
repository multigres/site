---
name: Lint

on:  # yamllint disable-line rule:truthy
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions: {}

jobs:
  naming-lint:
    name: Naming Lint
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Check Multigres name capitalization
        run: ./tools/naming_linter.sh
        shell: bash
